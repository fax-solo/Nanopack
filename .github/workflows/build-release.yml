name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up MSVC build tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Fix node-gyp for Python 3.12 (distutils removal)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Download auto vendor binaries
        run: npm run download-vendor
        continue-on-error: true

      - name: Build TypeScript
        run: npm run build:all

      - name: Bump version
        id: bump
        shell: pwsh
        run: |
          npm version patch --no-git-tag-version --no-commit-hooks
          $ver = node -p "require('./package.json').version"
          echo "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Ensure vendor/win directory exists
        run: mkdir vendor\win -Force
        shell: pwsh

      - name: Package for Windows
        run: npx electron-builder --win --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: steps.bump.outputs.VERSION != ''
        with:
          tag_name: v${{ steps.bump.outputs.VERSION }}
          name: NanoPack v${{ steps.bump.outputs.VERSION }}
          body: |
            ## NanoPack v${{ steps.bump.outputs.VERSION }}

            Auto-built release triggered by commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

            ### Windows
            - `NanoPack Setup ${{ steps.bump.outputs.VERSION }}.exe` — NSIS installer
          files: release/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 1) {
            git commit -m "Bump version to ${{ steps.bump.outputs.VERSION }} [skip ci]"
            git push origin HEAD:main
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
